<!doctype HTML>
<html>
  <head>
    <title>Bre 97 personal Doc</title>
    
    <script>
      window.onload = function () {
       let canvas = document.getElementById("square");
       let ctx = canvas.getContext("2d");
       ctx.fillStyle = "red";
       ctx.fillRect(1,1,600,40);
      }
    </script>
  </head>
  
  <body>
    <div style="color:#5E99F0">
      <center>
        <canvas id="square" width="600" height="40"></canvas>
        <h1># This is "Bre 97" Doc !</h1>
      </center>
    </div>

    <div style="color:#ABCABC">
      <center>
        <p>Recommended to use -Google Fonts- to read.</p>
        <p>or use -Microsoft Yahei Fonts-?</p>
      </center>
    </div>
    
  </body>
</html>
