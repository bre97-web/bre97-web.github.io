<!doctype HTML>
<html>
  <head>
    <title>Bre 97 personal Doc</title>
    
    <script>
      window.onload = function () {
       let canvas = document.getElementById("square");
       let ctx = canvas.getContext("2d");
       
        <h1><center># This is "Bre 97" Doc !</center></h1>
        
       ctx.fillStyle = "red";
       ctx.fillRect(10, 10, 100, 50);
      }
    </script>
  </head>
  
  <body>
    <div style="color:#5E99F0">
      <canvas id="square" width="400" height="450"></canvas>
      <h1><center># This is "Bre 97" Doc !</center></h1>
    </div>

    <div style="color:#ABCABC">
      <center>
        <p>Recommended to use -Google Fonts- to read.</p>
        <p>or use -Microsoft Yahei Fonts-?</p>
      </center>
    </div>
  
    <canvas id="canvas" width="400" height="450"></canvas>
    
  </body>
</html>
